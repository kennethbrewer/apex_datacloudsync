<template>
    <lightning-card title={title} icon-name="standard:datacloud">
        <template if:true={rows}>
            <lightning-datatable
                key-field="id"
                data={rows}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
        </template>

<template if:true={error}>
    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-around_medium" role="alert">
        <span class="slds-assistive-text">Error</span>
        <lightning-icon
            icon-name="utility:error"
            size="x-small"
            class="slds-m-right_small"
            alternative-text="Error">
        </lightning-icon>
        <h2>{error}</h2>
    </div>
</template>
    </lightning-card>
</template>
